<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0eaff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Antenna stem -->
  <rect x="240" y="72" width="32" height="72" rx="16" fill="white" opacity="0.95"/>
  <!-- Antenna ball -->
  <circle cx="256" cy="58" r="28" fill="white"/>
  <!-- Antenna ball inner glow -->
  <circle cx="256" cy="58" r="16" fill="#93c5fd"/>

  <!-- Head -->
  <rect x="104" y="142" width="304" height="232" rx="48" fill="url(#headGrad)"/>

  <!-- Left eye -->
  <circle cx="186" cy="244" r="38" fill="#2563eb"/>
  <circle cx="198" cy="232" r="12" fill="white" opacity="0.9"/>
  <circle cx="186" cy="244" r="12" fill="#1e3a8a"/>

  <!-- Right eye -->
  <circle cx="326" cy="244" r="38" fill="#2563eb"/>
  <circle cx="338" cy="232" r="12" fill="white" opacity="0.9"/>
  <circle cx="326" cy="244" r="12" fill="#1e3a8a"/>

  <!-- Mouth -->
  <rect x="180" y="314" width="152" height="30" rx="15" fill="#2563eb" opacity="0.85"/>

  <!-- Ear accents (small circles on sides of head) -->
  <circle cx="104" cy="258" r="18" fill="#60a5fa" opacity="0.6"/>
  <circle cx="408" cy="258" r="18" fill="#60a5fa" opacity="0.6"/>

  <!-- Code prompt dot at bottom of head -->
  <circle cx="256" cy="408" r="10" fill="white" opacity="0.4"/>
  <circle cx="224" cy="408" r="10" fill="white" opacity="0.25"/>
  <circle cx="288" cy="408" r="10" fill="white" opacity="0.25"/>
</svg>
